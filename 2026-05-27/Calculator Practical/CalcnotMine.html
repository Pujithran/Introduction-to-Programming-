<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        /* CSS: Basic Styling */
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .calculator { background: #333; padding: 20px; border-radius: 10px; }
        #display { width: 100%; height: 50px; text-align: right; margin-bottom: 10px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="setOperator('/')">/</button>
            <button onclick="setOperator('*')">*</button>
            <button onclick="setOperator('-')">-</button>
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="setOperator('+')">+</button>
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendNumber(num) { display.value += num; }
        function setOperator(op) { display.value += op; }
        function clearDisplay() { display.value = ''; }
        function calculate() { display.value = eval(display.value); }
    </script>
</body>
</html>
